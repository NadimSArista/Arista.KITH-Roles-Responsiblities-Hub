<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roles & Responsibilities Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="login-screen" style="
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  flex-direction:column;
  color:white;
">

  <h1 style="margin-bottom:20px;">Arista Roles Hub</h1>

  <button onclick="loginWithGoogle()" style="
    padding:14px 24px;
    background:#ffffff;
    color:#000;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
  ">
    Sign in with Google
  </button>

</div>

<!-- 🔓 MAIN CONTENT -->
<div id="main-content" style="display:none;">

  <!-- NAVBAR -->
  <div class="navbar">

    <a href="index.html" class="logo">
      <img src="logo.png" alt="Arista Systems Logo">
    </a>

    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="departments.html">Departments</a>
      <a href="org-chart.png" target="_blank">Org Chart ↗</a>
      <a href="directory.html">Directory</a>

      <!-- ✅ LOGOUT BUTTON -->
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">

      <h1>Roles & Responsibilities Hub</h1>

      <h2 class="sub-heading">Arista KITH · 2026</h2>

      <p>
        A centralized platform to view ownership, responsibilities, organization chart, directory and execution across all departments.
      </p>

      <a href="departments.html" class="cta-btn">
        Explore Departments →
      </a>

    </div>
  </div>

  <div class="footer">
    © 2026 Arista Systems Pvt. Ltd.
  </div>

</div>

<!-- 🔥 FIREBASE AUTH SCRIPT -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged,
    setPersistence,
    browserLocalPersistence,
    signOut
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuK6khpaCk30axVzPp6jqdWfECFgAGLXY",
    authDomain: "arista-roles-hub.firebaseapp.com",
    projectId: "arista-roles-hub",
    storageBucket: "arista-roles-hub.firebasestorage.app",
    messagingSenderId: "771103191015",
    appId: "1:771103191015:web:a6a163ad206253891c5742"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ✅ KEEP USER LOGGED IN
  setPersistence(auth, browserLocalPersistence);

  // 🔐 LOGIN FUNCTION
  window.loginWithGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      const email = user.email;

      if (
        email.endsWith("@aristasystems.in") ||
        email.endsWith("@kithnyc.com")
      ) {
        showApp();
      } else {
        alert("Access Denied: Unauthorized email");
        await signOut(auth);
      }

    } catch (error) {
      console.error(error);
      alert("Login failed");
    }
  };

  // 🔓 LOGOUT FUNCTION (NEW)
  window.logout = async () => {
    try {
      await signOut(auth);
      showLogin();
    } catch (error) {
      console.error(error);
    }
  };

  // 🔥 AUTO LOGIN CHECK
  onAuthStateChanged(auth, (user) => {
    if (user) {
      const email = user.email;

      if (
        email.endsWith("@aristasystems.in") ||
        email.endsWith("@kithnyc.com")
      ) {
        showApp();
      } else {
        signOut(auth);
      }
    } else {
      showLogin();
    }
  });

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-content").style.display = "block";
  }

  function showLogin() {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("main-content").style.display = "none";
  }
</script>

</body>
</html>

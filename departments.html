<!-- ✅ AUTH CONTROL (STANDARD FOR ALL PAGES) -->
<script type="module">
  import { isUserLoggedIn } from "./auth.js";

  // 🔐 Check login (no flicker, no cross-tab issues)
  if (!isUserLoggedIn()) {
    window.location.replace("index.html");
  }

  // 🔒 Cross-tab logout sync ONLY (safe)
  window.addEventListener("storage", function (e) {
    if (e.key === "userLoggedIn" && e.newValue === null) {
      window.location.replace("index.html");
    }
  });
